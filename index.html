<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Blast | Waterpistolen van de Toekomst</title>
    <style>
        :root { --primary: #ffffff; --secondary: #888888; --neon-blue: #00f2ff; --bg: #000000; --accent: #bc13fe; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--primary); font-family: sans-serif; text-align: center; }
        
        nav { padding: 30px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; letter-spacing: 2px; text-decoration: none; color: white; font-size: 1.5rem; }

        .hero { padding: 80px 10% 40px; }
        .hero h1 { font-size: 4rem; margin: 0; color: var(--neon-blue); text-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }

        .section { padding: 40px 10%; }
        
        .form-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #050505; 
            padding: 30px; 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
        }
        h2 { margin-top: 0; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 20px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; font-size: 1rem; }
        .submit-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1.1rem; transition: 0.3s; }
        .submit-btn:hover { background: #a010db; transform: scale(1.02); }

        .sponsor-section { margin-top: 60px; padding: 40px; background: #050505; border-top: 1px solid #111; }
        .sponsor-logo { height: 60px; filter: grayscale(100%); transition: 0.5s; cursor: pointer; }
        .sponsor-logo:hover { filter: grayscale(0%); transform: scale(1.1); }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">GAME BLAST 🌊</a>
    <div style="font-size: 0.7rem; color: #32cd32; font-family: monospace;">● PARTNERSHIP_ACTIVE</div>
</nav>

<section class="hero">
    <h1 id="days-count">Laden...</h1>
    <p style="color: var(--secondary); font-size: 1.2rem;">Tot de lancering door Mykola & Petro.</p>
</section>

<section class="section">
    <div class="form-container">
        <h2>Pre-order & Support</h2>
        <form action="https://formspree.io" method="POST">
            <input type="email" name="email" placeholder="Vul je e-mailadres in" required>
            <textarea name="bericht" rows="4" placeholder="Stel hier je vraag over de waterpistolen..." required></textarea>
            <input type="hidden" name="_next" value="https://github.io">
            <button type="submit" class="submit-btn">VERZEND BERICHT</button>
        </form>
    </div>
</section>

<section class="sponsor-section">
    <p style="color: var(--secondary); letter-spacing: 3px; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 25px;">Mede mogelijk gemaakt door</p>
    <a href="https://kiwi-electronics.com" target="_blank">
        <!-- Zorg dat de naam hieronder precies klopt met je bestand op GitHub -->
        <img src="kiwi-logo.png" alt="Kiwi Electronics" class="sponsor-logo">
    </a>
</section>

<script>
    const target = new Date("October 22, 2027 09:45:00").getTime();
    function updateTimer() {
        const diff = target - new Date().getTime();
        document.getElementById('days-count').innerText = Math.floor(diff / 86400000) + " Dagen";
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
