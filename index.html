<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Blast | Pre-order</title>
    <style>
        :root { --primary: #ffffff; --secondary: #888888; --neon-blue: #00f2ff; --bg: #000000; --accent: #bc13fe; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--primary); font-family: sans-serif; text-align: center; }
        
        nav { padding: 30px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; letter-spacing: 2px; text-decoration: none; color: white; }

        .hero { padding: 100px 10%; }
        .hero h1 { font-size: 4rem; margin: 0; color: var(--neon-blue); }

        .section { padding: 50px 10%; }
        
        .form-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #050505; 
            padding: 30px; 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
        }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 20px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; }
        .submit-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; }

        /* SPONSOR STYLING */
        .sponsor-section { margin-top: 60px; padding: 40px; background: #050505; border-top: 1px solid #111; }
        .sponsor-grid { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 20px; }
        .sponsor-logo { height: 60px; filter: grayscale(100%); transition: 0.3s; cursor: pointer; }
        .sponsor-logo:hover { filter: grayscale(0%); transform: scale(1.1); }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">GAME BLAST</a>
    <div style="font-size: 0.7rem; color: #32cd32; font-family: monospace;">● SPONSOR_PARTNERSHIP_V1</div>
</nav>

<section class="hero">
    <h1 id="days-count">530 Dagen</h1>
    <p style="color: var(--secondary);">Tot de officiële lancering door Mykola & Petro.</p>
</section>

<section class="section">
    <div class="form-container">
        <h2>Pre-order & Support</h2>
        <form action="https://formspree.io/f/mwvaryej" method="POST">
            <input type="email" name="email" placeholder="Je e-mailadres" required>
            <textarea name="bericht" rows="4" placeholder="Hoe kan ik pre-orderen?" required></textarea>
            <input type="hidden" name="_next" value="https://github.io">
            <button type="submit" class="submit-btn">VERZEND BERICHT</button>
        </form>
    </div>
</section>

<!-- SPONSOR SECTIE -->
<section class="sponsor-section">
    <p style="color: var(--secondary); letter-spacing: 2px; font-size: 0.8rem; text-transform: uppercase;">Mede mogelijk gemaakt door</p>
    <div class="sponsor-grid">
        <a href="https://kiwi-electronics.com" target="_blank">
            <img src="kiwi-logo.png" alt="Kiwi Electronics" class="sponsor-logo">
        </a>
    </div>
</section>

<script>
    const target = new Date("October 22, 2027 09:45:00").getTime();
    setInterval(() => {
        const diff = target - new Date().getTime();
        document.getElementById('days-count').innerText = Math.floor(diff / 86400000) + " Dagen";
    }, 1000);
</script>

</body>
</html>
