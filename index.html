<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Blast | AI Support v73</title>
    <style>
        :root { 
            --primary: #ffffff; 
            --secondary: #888888; 
            --neon-blue: #00f2ff; 
            --bg: #000000; 
            --accent: #bc13fe; 
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--primary); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
            scroll-behavior: smooth; 
            overflow-x: hidden; 
        }
        
        nav { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            padding: 30px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1000; 
            border-bottom: 1px solid #111; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(20px); 
        }
        .logo { 
            font-weight: 800; 
            font-size: 1.2rem; 
            letter-spacing: 2px; 
            text-decoration: none; 
            color: white; 
        }

        .hero { 
            height: 60vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 0 10%; 
        }
        .hero h1 { 
            font-size: 4rem; 
            font-weight: 800; 
            margin: 0; 
            color: var(--neon-blue);
        }

        .section { padding: 80px 10%; border-top: 1px solid #111; }
        .section-title { 
            font-size: 0.8rem; 
            color: var(--secondary); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 30px; 
        }

        /* AI CHATBOX STYLING */
        .chat-container { 
            max-width: 600px; 
            background: #050505; 
            border: 1px solid #111; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); 
        }
        #chat-window { 
            height: 350px; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            border-bottom: 1px solid #111; 
        }
        .msg { padding: 12px 18px; border-radius: 8px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .user-msg { background: #222; align-self: flex-end; color: white; }
        .ai-msg { background: var(--accent); align-self: flex-start; color: white; font-weight: 500; }
        
        .chat-input-area { display: flex; background: #000; padding: 5px; }
        #user-input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            padding: 20px; 
            color: white; 
            outline: none; 
            font-size: 1rem; 
        }
        .send-btn { 
            background: var(--primary); 
            color: black; 
            border: none; 
            padding: 0 30px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .send-btn:hover { background: var(--neon-blue); }
        .send-btn:disabled { background: #333; cursor: not-allowed; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">GAME BLAST</a>
    <div style="font-size: 0.7rem; color: #32cd32; font-family: monospace;">● SILENT_FETCH_V73_ACTIVE</div>
</nav>

<section class="hero">
    <h1 id="days-count">Laden...</h1>
    <p style="color: var(--secondary); font-size: 1.5rem;">Tot de lancering door Mykola & Petro.</p>
</section>

<section class="section" id="ai-chat">
    <div class="section-title">Game Blast AI Support</div>
    <div class="chat-container">
        <div id="chat-window">
            <div class="msg ai-msg">Hallo! Heb je een vraag over Game Blast waterpistolen? Typ het hieronder.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Stel je vraag hier..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" class="send-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>
</section>

<script>
    // 1. Timer logica (Aftellen naar 22 okt 2027)
    const target = new Date("October 22, 2027 09:45:00").getTime();
    function updateTimer() {
        const now = new Date().getTime();
        const diff = target - now;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('days-count').innerText = days + " Dagen";
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // 2. AI Chat logica
    let step = 1; 
    let savedQuestion = "";

    function addMessage(text, type) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${type}-msg`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const val = input.value.trim();
        if (!val) return;

        addMessage(val, 'user');
        input.value = "";

        if (step === 1) {
            savedQuestion = val;
            setTimeout(() => {
                addMessage("Bedankt voor je vraag. We hebben hem ontvangen.", "ai");
                setTimeout(() => {
                    addMessage("Voer je e-mailadres in zodat we je kunnen antwoorden.", "ai");
                    step = 2;
                }, 800);
            }, 600);
        } 
        else if (step === 2) {
            if (val.includes("@")) {
                addMessage("Gegevens worden verzonden naar Mykola & Petro...", "ai");
                btn.disabled = true;

                const formData = new FormData();
                formData.append("Vraag", savedQuestion);
                formData.append("Email", val);

                try {
                    const response = await fetch("https://formspree.io", {
                        method: "POST",
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });

                    if (response.ok) {
                        addMessage("Succes! Bedankt. Ons team neemt snel contact met je op.", "ai");
                        step = 1; 
                    } else {
                        addMessage("Fout: Kon niet verzenden. Probeer het later opnieuw.", "ai");
                    }
                } catch (error) {
                    addMessage("Netwerkfout. Controleer je verbinding.", "ai");
                }
                btn.disabled = false;
            } else {
                addMessage("Voer een geldig e-mailadres in.", "ai");
            }
        }
    }
</script>

</body>
</html>
