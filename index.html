<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Blast | Pre-order</title>
    <style>
        :root { --primary: #ffffff; --secondary: #888888; --neon-blue: #00f2ff; --bg: #000000; --accent: #bc13fe; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--primary); font-family: sans-serif; text-align: center; }
        
        nav { padding: 30px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; letter-spacing: 2px; text-decoration: none; color: white; }

        .hero { padding: 100px 10%; }
        .hero h1 { font-size: 4rem; margin: 0; color: var(--neon-blue); }

        .section { padding: 50px 10%; }
        
        /* FORMULIER STYLING */
        .form-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #050505; 
            padding: 30px; 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
        }
        input, textarea { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            background: #111; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 8px; 
            font-size: 1rem;
        }
        .submit-btn { 
            width: 100%; 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 1.1rem; 
        }
        .submit-btn:hover { background: #a010db; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">GAME BLAST</a>
    <div style="font-size: 0.7rem; color: #32cd32; font-family: monospace;">● REDIRECT_MODE_ACTIVE</div>
</nav>

<section class="hero">
    <h1 id="days-count">530 Dagen</h1>
    <p style="color: var(--secondary);">Tot de lancering door Mykola & Petro.</p>
</section>

<section class="section">
    <div class="form-container">
        <h2>Pre-order & Support</h2>
        <p style="color: var(--secondary);">Stel je vraag of vraag naar de pre-order details.</p>
        
        <!-- DIT IS HET FORMULIER DAT DE PAGINA OPENT -->
        <form action="https://formspree.io/f/mwvaryej" method="POST">
            <input type="email" name="email" placeholder="Je e-mailadres" required>
            <textarea name="bericht" rows="4" placeholder="Hoe kan ik pre-orderen?" required></textarea>
            
            <!-- Hiermee komt de klant na het verzenden terug op je site (optioneel) -->
            <input type="hidden" name="_next" value="https://github.io">
            
            <button type="submit" class="submit-btn">VERZEND BERICHT</button>
        </form>
    </div>
</section>

<script>
    const target = new Date("October 22, 2027 09:45:00").getTime();
    setInterval(() => {
        const diff = target - new Date().getTime();
        document.getElementById('days-count').innerText = Math.floor(diff / 86400000) + " Dagen";
    }, 1000);
</script>

</body>
</html>
